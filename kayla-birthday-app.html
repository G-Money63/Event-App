<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Kayla's 30th Birthday Weekend</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',sans-serif;background:#FDF8F0;color:#1a1a1a;min-height:100vh}
.app{max-width:480px;margin:0 auto;min-height:100vh}
.hdr{background:#1B3A6B;padding:26px 20px 18px;text-align:center;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 60% 0%,rgba(200,149,42,.2) 0%,transparent 65%);pointer-events:none}
.hdr-eye{font-size:10px;font-weight:700;letter-spacing:3px;color:#C8952A;text-transform:uppercase;margin-bottom:5px;position:relative}
.hdr-title{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;color:#fff;line-height:1.15;position:relative}
.hdr-title span{color:#C8952A}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:5px;letter-spacing:1.5px;text-transform:uppercase;position:relative}
.hdr-line{width:40px;height:2px;background:#C8952A;margin:10px auto 0;position:relative}
.nav{background:#fff;border-bottom:2px solid #EAF1FB;display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.nav::-webkit-scrollbar{display:none}
.nav-tab{flex:0 0 auto;padding:12px 15px;font-size:11px;font-weight:600;letter-spacing:.5px;color:#999;cursor:pointer;border:none;border-bottom:3px solid transparent;background:none;font-family:'Montserrat',sans-serif;white-space:nowrap;transition:all .2s}
.nav-tab.active{color:#1B3A6B;border-bottom-color:#C8952A}
.overlay{position:fixed;inset:0;background:rgba(10,20,40,.92);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .25s ease}
.popup{background:#1B3A6B;border-radius:22px;padding:22px 20px 20px;width:100%;max-width:360px;text-align:center;border:1px solid rgba(200,149,42,.35);animation:popIn .4s cubic-bezier(.34,1.56,.64,1);max-height:92vh;overflow-y:auto}
.popup-badge{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#C8952A;margin-bottom:4px}
.popup-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:#fff;margin-bottom:14px;line-height:1.2}
.popup-title span{color:#C8952A}
.photo-ring{width:170px;height:170px;border-radius:50%;margin:0 auto 14px;padding:4px;background:linear-gradient(135deg,#C8952A,#f0c060,#C8952A);position:relative}
.photo-inner{width:100%;height:100%;border-radius:50%;overflow:hidden;background:rgba(255,255,255,.1)}
.photo-inner img{width:100%;height:100%;object-fit:cover;display:block}
.photo-day-label{position:absolute;bottom:2px;right:6px;background:#C8952A;color:#1B3A6B;font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:3px 7px;border-radius:100px}
.q-box{background:rgba(255,255,255,.08);border-radius:12px;padding:12px 14px;margin-bottom:10px;text-align:left}
.q-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#C8952A;margin-bottom:5px}
.q-text{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:#fff;line-height:1.35}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:11px}
.opt{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:9px;padding:9px 7px;color:#fff;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;text-align:left;line-height:1.4}
.opt:hover:not(:disabled){background:rgba(200,149,42,.2);border-color:#C8952A}
.opt .lbl{display:block;font-size:9px;font-weight:800;letter-spacing:1px;color:#C8952A;margin-bottom:2px}
.opt.correct{background:rgba(76,175,80,.3);border-color:#4caf50}
.opt.wrong{background:rgba(244,67,54,.2);border-color:#f44336;opacity:.7}
.opt.reveal{background:rgba(76,175,80,.3);border-color:#4caf50}
.opt:disabled{cursor:default}
.rbanner{border-radius:9px;padding:9px 12px;margin-bottom:10px;font-size:12px;font-weight:600;text-align:center}
.rbanner.ok{background:rgba(76,175,80,.2);color:#a5d6a7;border:1px solid rgba(76,175,80,.3)}
.rbanner.no{background:rgba(244,67,54,.15);color:#ef9a9a;border:1px solid rgba(244,67,54,.25)}
.cta{background:#C8952A;color:#1B3A6B;border:none;padding:12px 24px;border-radius:100px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;cursor:pointer;width:100%;transition:opacity .2s}
.cta:hover{opacity:.88}
.cta:disabled{opacity:.4;cursor:default}
.day-sec{padding:16px}
.day-hdr{background:#1B3A6B;border-radius:11px;padding:13px 16px;margin-bottom:12px;display:flex;align-items:center;gap:11px}
.day-hdr-emoji{font-size:21px}
.day-hdr-day{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#C8952A}
.day-hdr-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:#fff;line-height:1.2}
.ev{background:#fff;border-radius:11px;padding:11px 13px;margin-bottom:7px;display:flex;gap:10px;align-items:flex-start;box-shadow:0 1px 4px rgba(0,0,0,.06);border-left:3px solid #C8952A}
.ev-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.ev-time{font-size:13px;font-weight:700;color:#C8952A;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px}
.ev-title{font-size:11px;font-weight:600;color:#1B3A6B;margin-bottom:2px}
.ev-detail{font-size:11px;color:#666;line-height:1.5}
.tip{background:#FFF8EC;border:1px solid rgba(200,149,42,.25);border-radius:9px;padding:10px 13px;margin-top:4px;font-size:11px;color:#7a5a1a;font-style:italic;line-height:1.5}
.bonus-card{background:#1B3A6B;border-radius:16px;margin-top:16px;overflow:hidden}
.bonus-card-top{padding:14px 16px 0;display:flex;flex-direction:column;align-items:center}
.bonus-tag{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#C8952A;margin-bottom:10px;align-self:flex-start}
.bonus-photo{width:140px;height:140px;border-radius:50%;border:4px solid #C8952A;overflow:hidden;margin-bottom:-18px;z-index:1;position:relative}
.bonus-photo img{width:100%;height:100%;object-fit:cover;display:block}
.bonus-card-bottom{background:#fff;padding:26px 16px 16px}
.bonus-q{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:#1B3A6B;margin-bottom:12px;line-height:1.4;text-align:center}
.bonus-opts{display:flex;flex-direction:column;gap:7px}
.bonus-opt{padding:11px 13px;border-radius:9px;border:2px solid #e8e8e8;font-size:12px;font-weight:500;color:#333;cursor:pointer;transition:all .15s;text-align:left;background:#fff;font-family:'Montserrat',sans-serif;width:100%;line-height:1.4}
.bonus-opt:hover:not(:disabled){border-color:#1B3A6B;background:#EAF1FB}
.bonus-opt.correct{background:#e8f5e9;border-color:#4caf50;color:#1b5e20;font-weight:600}
.bonus-opt.wrong{background:#ffebee;border-color:#f44336;color:#b71c1c}
.bonus-opt.reveal{background:#e8f5e9;border-color:#4caf50;color:#1b5e20;font-weight:600}
.bonus-opt:disabled{cursor:default}
.blbl{font-size:10px;font-weight:800;color:#C8952A;margin-right:5px}
.bonus-opt.correct .blbl,.bonus-opt.reveal .blbl{color:#2e7d32}
.bonus-opt.wrong .blbl{color:#c62828}
.bonus-result{border-radius:8px;padding:9px 12px;margin-top:10px;font-size:12px;font-weight:600;text-align:center}
.bonus-result.ok{background:#e8f5e9;color:#2e7d32;border:1px solid #4caf50}
.bonus-result.no{background:#ffebee;color:#c62828;border:1px solid #f44336}
.lock-card{background:#1B3A6B;border-radius:16px;margin-top:16px;padding:20px;text-align:center}
.lock-icon{font-size:32px;margin-bottom:8px}
.lock-text{color:rgba(255,255,255,.6);font-size:12px;line-height:1.6}
.lock-date{color:#C8952A;font-weight:700;font-size:13px;margin-top:4px}
.flights-sec{padding:16px}
.slbl{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#C8952A;margin-bottom:10px}
.fl{background:#fff;border-radius:11px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-left:3px solid #1B3A6B}
.fl-who{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#C8952A;margin-bottom:3px}
.fl-route{font-size:16px;font-weight:700;color:#1B3A6B;font-family:'Cormorant Garamond',serif;margin-bottom:2px}
.fl-detail{font-size:11px;color:#666;line-height:1.6}
.fl-note{font-size:11px;color:#C8952A;font-weight:600;margin-top:3px}
.ibox{background:#EAF1FB;border-radius:9px;padding:11px 13px;font-size:11px;color:#1B3A6B;line-height:1.6;margin-top:6px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{transform:translateY(24px) scale(.93);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
</style>
</head>

<div class="app">
<div id="ov" class="overlay" style="display:none">
  <div class="popup">
    <div class="popup-badge" id="pb"></div>
    <div class="popup-title">Happy <span>30th</span>, Kayla! &#127797;</div>
    <div class="photo-ring">
      <div class="photo-inner"><img id="pi" src="" alt="Kayla"></div>
      <div class="photo-day-label" id="pdl"></div>
    </div>
    <div class="q-box">
      <div class="q-label">&#128248; Photo Challenge</div>
      <div class="q-text" id="pq"></div>
    </div>
    <div class="opts" id="po"></div>
    <div class="rbanner" id="pr" style="display:none"></div>
    <button class="cta" id="pc" disabled onclick="closeOv()">Pick an answer first!</button>
  </div>
</div>
<div class="hdr">
  <div class="hdr-eye">Scottsdale, AZ &#183; April 8&#8211;12, 2026</div>
  <div class="hdr-title">Kayla&#8217;s <span>30th</span><br>Birthday Weekend</div>
  <div class="hdr-sub">Gary &#183; Alex &amp; Annie &#183; Kayla &amp; Connor</div>
  <div class="hdr-line"></div>
</div>
<nav class="nav" id="nav"></nav>
<div id="con"></div>
<div style="text-align:center;padding:14px 0 8px;font-size:10px;color:#bbb;font-family:Montserrat,sans-serif;letter-spacing:1px;">v1.0.1</div>
</div>

<script>

var DAYS, MQ, BQ;
try {
  DAYS = JSON.parse(document.getElementById("d-days").value);
  MQ   = JSON.parse(document.getElementById("d-mq").value);
  BQ   = JSON.parse(document.getElementById("d-bq").value);
} catch(e) {
  document.body.innerHTML = "<p style='padding:20px;color:red'>Data load error: " + e.message + "</p>";
}

var IDS    = ["wed","thu","fri","sat","sun"];
var UNLOCK = ["2026-04-08","2026-04-09","2026-04-10","2026-04-11","2026-04-12"];
var DNAMES = ["Wednesday, April 8","Thursday, April 9","Friday, April 10","Saturday, April 11","Sunday, April 12"];
var tab = "wed", popupShown = {}, popupAnswered = {}, bonusDone = {};

function todayStr() {
  var n = new Date();
  var m = String(n.getMonth()+1).padStart(2,"0");
  var d = String(n.getDate()).padStart(2,"0");
  return n.getFullYear() + "-" + m + "-" + d;
}
function isUnlocked(di) { return todayStr() >= UNLOCK[di]; }

function buildNav() {
  var tabs = [
    {id:"wed",lb:"Wed 4/8"},{id:"thu",lb:"Thu 4/9"},{id:"fri",lb:"Fri 4/10"},
    {id:"sat",lb:"Sat 4/11"},{id:"sun",lb:"Sun 4/12"},{id:"flights",lb:"Flights"}
  ];
  document.getElementById("nav").innerHTML = tabs.map(function(t) {
    return "<button class=\"nav-tab" + (tab===t.id ? " active" : "") + "\" onclick=\"sw(this.dataset.id)\" data-id=\"" + t.id + "\">" + t.lb + "</button>";
  }).join("");
}

function sw(id) {
  tab = id; buildNav();
  var di = IDS.indexOf(id);
  if (di >= 0 && isUnlocked(di) && !popupShown[id]) { popupShown[id] = true; showOv(di); }
  render();
}

function showOv(di) {
  var q = MQ[di], d = DAYS[di];
  document.getElementById("pb").textContent  = "Day " + (di+1) + " of 5 - " + d.date;
  document.getElementById("pi").src          = q.p;
  document.getElementById("pdl").textContent = d.day;
  document.getElementById("pq").textContent  = q.q;
  document.getElementById("ov").style.display = "flex";
  renderPOpts(di);
}

function renderPOpts(di) {
  var q = MQ[di], key = IDS[di], ans = popupAnswered[key], L = ["A","B","C","D"];
  document.getElementById("po").innerHTML = q.o.map(function(opt, oi) {
    var cls = "opt";
    if (ans !== undefined) { if (oi === q.a) cls += " correct"; else if (oi === ans) cls += " wrong"; }
    return "<button class=\"" + cls + "\" onclick=\"pickP(" + di + "," + oi + ")\" " + (ans !== undefined ? "disabled" : "") + "><span class=\"lbl\">" + L[oi] + "</span>" + opt + "</button>";
  }).join("");
  var r = document.getElementById("pr"), c = document.getElementById("pc");
  if (ans !== undefined) {
    r.style.display = "block"; r.className = "rbanner " + (ans === q.a ? "ok" : "no");
    r.textContent = ans === q.a ? "Correct! Nice one!" : "Nope! It was " + L[q.a] + " - " + q.o[q.a];
    c.disabled = false; c.textContent = "See " + DAYS[di].day + " plan";
  } else {
    r.style.display = "none"; c.disabled = true; c.textContent = "Pick an answer first!";
  }
}

function pickP(di, oi) {
  var k = IDS[di];
  if (popupAnswered[k] !== undefined) return;
  popupAnswered[k] = oi; renderPOpts(di);
}
function closeOv() { document.getElementById("ov").style.display = "none"; }

function bonusCard(di) {
  if (!isUnlocked(di)) {
    return "<div class=\"lock-card\"><div class=\"lock-icon\">&#128274;</div><div class=\"lock-text\">Bonus photo unlocks on</div><div class=\"lock-date\">" + DNAMES[di] + "</div></div>";
  }
  if (bonusDone[di]) return "";
  var q = BQ[di], ans = bonusDone["ans"+di], L = ["A","B","C","D"];
  var opts = q.o.map(function(opt, oi) {
    var cls = "bonus-opt";
    if (ans !== undefined) { if (oi === q.a) cls += " reveal"; else if (oi === ans) cls += " wrong"; }
    return "<button class=\"" + cls + "\" onclick=\"pickB(" + di + "," + oi + ")\" " + (ans !== undefined ? "disabled" : "") + "><span class=\"blbl\">" + L[oi] + ".</span>" + opt + "</button>";
  }).join("");
  var res = "";
  if (ans !== undefined) {
    var ok = ans === q.a;
    res = "<div class=\"bonus-result " + (ok ? "ok" : "no") + "\">" + (ok ? "Correct! &#127881;" : "Nope! It was " + L[q.a] + " - " + q.o[q.a]) + "</div>"
        + "<button class=\"cta\" style=\"margin-top:12px;font-size:11px\" onclick=\"dismissBonus(" + di + ")\">Got it &#10006;</button>";
  }
  return "<div class=\"bonus-card\"><div class=\"bonus-card-top\"><div class=\"bonus-tag\">&#127881; Bonus Photo Challenge</div><div class=\"bonus-photo\"><img src=\"" + q.p + "\" alt=\"Kayla\"></div></div><div class=\"bonus-card-bottom\"><div class=\"bonus-q\">" + q.q + "</div><div class=\"bonus-opts\">" + opts + "</div>" + res + "</div></div>";
}

function pickB(di, oi) { if (bonusDone["ans"+di] !== undefined) return; bonusDone["ans"+di] = oi; render(); }
function dismissBonus(di) { bonusDone[di] = true; render(); }

function render() {
  var el = document.getElementById("con"), di = IDS.indexOf(tab);
  if (di >= 0) {
    var d = DAYS[di];
    el.innerHTML = "<div class=\"day-sec\"><div class=\"day-hdr\"><div class=\"day-hdr-emoji\">" + d.emoji + "</div><div><div class=\"day-hdr-day\">" + d.day + " - " + d.date + "</div><div class=\"day-hdr-title\">" + d.subtitle + "</div></div></div>"
      + d.events.map(function(ev) {
          return "<div class=\"ev\"><div class=\"ev-icon\">" + ev.icon + "</div><div><div class=\"ev-time\">" + ev.time + "</div><div class=\"ev-title\">" + ev.title + "</div><div class=\"ev-detail\">" + ev.detail + "</div></div></div>";
        }).join("")
      + "<div class=\"tip\">" + d.tip.split("|").map(function(t,i){return "&#128161; "+t.trim();}).join("<br><br>") + "</div>" + bonusCard(di) + "</div>";
  } else if (tab === "flights") {
    el.innerHTML = "<div class=\"flights-sec\">"
      + "<div class=\"slbl\">Arrivals - April 8</div>"
      + "<div class=\"fl\"><div class=\"fl-who\">Kayla &amp; Connor - AS163</div><div class=\"fl-route\">PAE to PHX</div><div class=\"fl-detail\">Departs 10:46 AM - Arrives 1:41 PM - Terminal 4</div></div>"
      + "<div class=\"fl\"><div class=\"fl-who\">Alex &amp; Annie - AA1625</div><div class=\"fl-route\">LAX to PHX</div><div class=\"fl-detail\">Departs 12:50 PM - Arrives 2:20 PM - Terminal 4</div></div>"
      + "<div class=\"slbl\" style=\"margin-top:18px\">Departures - April 12</div>"
      + "<div class=\"fl\"><div class=\"fl-who\">Alex &amp; Annie - AA2689</div><div class=\"fl-route\">PHX to LAX</div><div class=\"fl-detail\">Departs 10:14 AM - Arrives 11:50 AM - Terminal 4</div><div class=\"fl-note\">&#9888; Uber at 8:15 AM</div></div>"
      + "<div class=\"fl\"><div class=\"fl-who\">Kayla &amp; Connor - AS731</div><div class=\"fl-route\">PHX to PAE</div><div class=\"fl-detail\">Departs 2:19 PM - Arrives 5:31 PM - Terminal 3</div><div class=\"fl-note\">Gary drops off on his way to Henderson</div></div>"
      + "<div class=\"ibox\">&#128663; Gary departs Tradition Club 8:00 AM - 4h 7m via I-10 East - Arrives Mountain Shadows ~12:10 PM</div>"
      + "</div>";
  }
}

var today = todayStr(), startDay = IDS[0];
for (var i = 0; i < UNLOCK.length; i++) { if (today >= UNLOCK[i]) startDay = IDS[i]; }
tab = startDay; buildNav(); render();
var startDi = IDS.indexOf(startDay);
if (startDi >= 0 && isUnlocked(startDi) && !popupShown[startDay]) {
  popupShown[startDay] = true; showOv(startDi);
}

</script>
